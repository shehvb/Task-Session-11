<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div    class="add-prod">
        <h1>Add New Product</h1>
        <label for="prod-name">Product Name</label>
        <input type="text" id="prod-name"  required>
        
        <label for="prod-price">Product Price</label>
        <input type="number" id="prod-price">
        
        <label for  ="prod-price">Product Categoray</label>
        <select id="prod-cat">
            <option value="Accessories">Accessories</option>
            <option value="Clothing">Clothing</option>
            <option value="Electronics">Electronics</option>
        </select>

        <label for="prod-desc">Product description</label>
        <textarea id="prod-desc" rows="4" cols="50"></textarea>
        <input type="file" id="file-input" accept="image/*">
        <button onclick="addProduct()" class="add-btn" id="update-btn">Add Product</button>
        <button onclick="showUpdatedProduct()" class="update-btn d-none" id="show-btn">Update Product</button>
        
        <input placeholder="Search by Name"
        oninput="search()" type="search" class="search" id="search">
        </div>
        
    <div class="products" id="products">
    </div>




    <script src="script.js"></script>
</body>
</html>
